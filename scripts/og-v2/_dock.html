<script>
  // Highlight active window icon. Set via data-active on body.
  (function(){
    var activeId = document.body.dataset.active;
    var domain = document.body.dataset.domain || 'ishaqhassan.dev';
    var el = document.querySelector('.wd[data-id="' + activeId + '"]');
    if (el) el.classList.add('active');
    document.getElementById('domain-text').textContent = domain;
  })();
</script>
