<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OG Image</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #0e1117;
    margin: 0;
    padding: 0;
  }

  .og {
    width: 1200px;
    height: 630px;
    position: relative;
    overflow: hidden;
    background: #0e1117;
    font-family: 'Inter', -apple-system, sans-serif;
  }

  .bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 700px 700px at -5% 110%, var(--accent-ambient) 0%, transparent 55%),
      radial-gradient(ellipse 500px 400px at 105% -5%, rgba(99,102,241,0.16) 0%, transparent 55%),
      radial-gradient(ellipse 300px 300px at 60% 60%, rgba(59,130,246,0.06) 0%, transparent 60%),
      #0e1117;
  }

  .dots {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px);
    background-size: 28px 28px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
  }

  .light-leak {
    position: absolute;
    top: -120px;
    left: -80px;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, var(--accent-leak) 0%, rgba(59,130,246,0.12) 40%, transparent 70%);
    filter: blur(60px);
  }

  .light-leak-r {
    position: absolute;
    bottom: -100px;
    right: 200px;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(99,102,241,0.18) 0%, transparent 70%);
    filter: blur(70px);
  }

  .top-accent {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent) 0%, rgba(99,102,241,0.6) 50%, transparent 100%);
  }

  .main {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 74px;
    display: flex;
    align-items: stretch;
    z-index: 10;
  }

  .left {
    flex: 1.05;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 32px 40px 32px 56px;
    gap: 0;
    border-right: 1px solid rgba(255,255,255,0.06);
  }

  .photo-wrap {
    position: relative;
    width: 96px;
    height: 96px;
    margin-bottom: 22px;
  }
  .photo-ring {
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: conic-gradient(from 120deg, var(--accent), #6366f1, var(--accent));
    padding: 2.5px;
  }
  .photo-ring-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: #0e1117;
    padding: 3px;
  }
  .photo-img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
  }
  .photo-glow {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    background: var(--accent-glow);
    filter: blur(20px);
    z-index: -1;
  }
  .verified {
    position: absolute;
    bottom: 0; right: -2px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #3b82f6);
    border: 2.5px solid #0e1117;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 12px var(--accent-glow);
  }
  .verified svg { width: 13px; height: 13px; fill: #fff; }

  .name {
    font-size: 68px;
    font-weight: 900;
    line-height: 0.92;
    letter-spacing: -3.5px;
    color: #ffffff;
    margin-bottom: 14px;
  }

  .primary-role {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .primary-role-text {
    font-size: 15px;
    font-weight: 700;
    color: var(--accent-2);
    letter-spacing: -0.2px;
  }

  .secondary-role {
    font-size: 13.5px;
    font-weight: 500;
    color: rgba(255,255,255,0.72);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 6px #22c55e, 0 0 12px rgba(34,197,94,0.4);
    flex-shrink: 0;
  }

  .tags {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 11.5px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    padding: 5px 13px;
    border-radius: 8px;
    letter-spacing: 0.1px;
    background: var(--accent-bg);
    color: var(--accent-2);
    border: 1px solid var(--accent-border);
  }

  .bio {
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.62);
    line-height: 1.65;
    max-width: 360px;
  }

  .right {
    flex: 0.88;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 32px 48px 32px 40px;
    gap: 12px;
  }

  .stats-label {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    margin-bottom: 4px;
  }

  .sc {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 18px;
    border-radius: 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    position: relative;
    overflow: hidden;
  }
  .sc::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: rgba(255,255,255,0.1);
  }

  .sc-icon-wrap {
    width: 44px; height: 44px;
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    background: var(--accent-bg);
    border: 1px solid var(--accent-border);
  }
  .sc-icon-wrap svg { width: 22px; height: 22px; fill: var(--accent-2); }

  .sc-num { color: var(--accent-2); }
  .sc-plus { color: var(--accent-plus); }

  .sc-body { flex: 1; }
  .sc-top { display: flex; align-items: baseline; gap: 4px; margin-bottom: 3px; }
  .sc-num {
    font-size: 34px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -1.5px;
  }
  .sc-plus { font-size: 20px; font-weight: 800; }
  .sc-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    margin-left: 4px;
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.65);
    border: 1px solid rgba(255,255,255,0.12);
    white-space: nowrap;
  }
  .sc-label {
    font-size: 11.5px;
    font-weight: 500;
    color: rgba(255,255,255,0.65);
    letter-spacing: 0;
  }

  .bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 74px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    z-index: 20;
    background: rgba(10,14,22,0.88);
    border-top: 1px solid rgba(255,255,255,0.07);
  }

  .dock {
    display: flex;
    gap: 5px;
    padding: 8px 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px;
  }
  .di {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .di img { width: 22px; height: 22px; object-fit: contain; }
  .di-flutter { background: rgba(84,197,248,0.12); border: 1px solid rgba(84,197,248,0.25); }
  .di-flutter img { width: 17px; height: 17px; }
  .di-dart { background: rgba(0,180,171,0.12); border: 1px solid rgba(0,180,171,0.25); }
  .di-react { background: rgba(97,218,251,0.12); border: 1px solid rgba(97,218,251,0.25); }
  .di-node { background: rgba(104,160,99,0.14); border: 1px solid rgba(104,160,99,0.28); }
  .di-ts { background: rgba(49,120,198,0.14); border: 1px solid rgba(49,120,198,0.28); color: #3d8ef0; font-weight: 800; font-size: 14px; font-family: 'JetBrains Mono', monospace; }
  .di-firebase { background: rgba(255,160,0,0.12); border: 1px solid rgba(255,160,0,0.28); }
  .di-docker { background: rgba(36,150,237,0.12); border: 1px solid rgba(36,150,237,0.28); }
  .di-python { background: rgba(55,118,171,0.12); border: 1px solid rgba(55,118,171,0.25); }
  .di-git { background: rgba(240,80,50,0.12); border: 1px solid rgba(240,80,50,0.28); }

  .domain-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    background: var(--accent-bg);
    border: 1px solid var(--accent-border);
    border-radius: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14.5px;
    font-weight: 600;
    color: var(--accent-2);
    letter-spacing: -0.2px;
  }
  .domain-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 8px #22c55e, 0 0 16px rgba(34,197,94,0.5);
  }
</style>
</head>
<body>
<div class="og" id="og">
  <div class="bg"></div>
  <div class="dots"></div>
  <div class="light-leak"></div>
  <div class="light-leak-r"></div>
  <div class="top-accent"></div>

  <div class="main">
    <div class="left">
      <div class="photo-wrap">
        <div class="photo-glow"></div>
        <div class="photo-ring">
          <div class="photo-ring-inner">
            <img src="" id="photoImg" class="photo-img" alt="">
          </div>
        </div>
        <div class="verified">
          <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
        </div>
      </div>

      <div class="name" id="nameBlock"></div>

      <div class="primary-role">
        <span class="primary-role-text" id="primaryRole"></span>
      </div>

      <div class="secondary-role">
        <div class="live-dot"></div>
        <span id="secondaryRole"></span>
      </div>

      <div class="tags" id="tags"></div>

      <div class="bio" id="bio"></div>
    </div>

    <div class="right">
      <div class="stats-label" id="statsLabel"></div>
      <div id="stats"></div>
    </div>
  </div>

  <div class="bottom">
    <div class="dock">
      <div class="di di-flutter"><img src="" data-icon="flutter"></div>
      <div class="di di-dart"><img src="" data-icon="dart"></div>
      <div class="di di-react"><img src="" data-icon="react"></div>
      <div class="di di-node"><img src="" data-icon="nodejs"></div>
      <div class="di di-ts">TS</div>
      <div class="di di-firebase"><img src="" data-icon="firebase"></div>
      <div class="di di-docker"><img src="" data-icon="docker"></div>
      <div class="di di-python"><img src="" data-icon="python"></div>
      <div class="di di-git"><img src="" data-icon="git"></div>
    </div>
    <div class="domain-badge">
      <div class="domain-dot"></div>
      <span id="domainText"></span>
    </div>
  </div>
</div>

<script>
const ICON_SVG = {
  play:   '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>',
  mic:    '<path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>',
  phone:  '<path d="M17 2H7c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 18H7V4h3v6l2-1.5L14 10V4h3v16z"/>',
  code:   '<path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/>',
  merge:  '<path d="M17 21c-1.66 0-3-1.34-3-3 0-1.31.84-2.41 2-2.83V8.83c-1.16-.42-2-1.52-2-2.83 0-1.66 1.34-3 3-3s3 1.34 3 3c0 1.31-.84 2.41-2 2.83v6.34c1.16.42 2 1.52 2 2.83 0 1.66-1.34 3-3 3zM7 3c1.66 0 3 1.34 3 3 0 1.31-.84 2.41-2 2.83v1.34c2.84 0 4 2.16 4 4 0 .52.48 1 1 1 1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3c0-.52-.48-1-1-1-2.84 0-4-2.16-4-4V8.83C4.84 8.41 4 7.31 4 6c0-1.66 1.34-3 3-3z"/>',
  check:  '<path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>',
  calendar:'<path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/>',
  globe:  '<path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm6.93 6h-2.95c-.32-1.25-.78-2.45-1.38-3.56 1.84.63 3.37 1.9 4.33 3.56zM12 4.04c.83 1.2 1.48 2.53 1.91 3.96h-3.82c.43-1.43 1.08-2.76 1.91-3.96zM4.26 14C4.1 13.36 4 12.69 4 12s.1-1.36.26-2h3.38c-.08.66-.14 1.32-.14 2s.06 1.34.14 2H4.26zm.82 2h2.95c.32 1.25.78 2.45 1.38 3.56-1.84-.63-3.37-1.89-4.33-3.56zm2.95-8H5.08c.96-1.66 2.49-2.93 4.33-3.56C8.81 5.55 8.35 6.75 8.03 8zM12 19.96c-.83-1.2-1.48-2.53-1.91-3.96h3.82c-.43 1.43-1.08 2.76-1.91 3.96zM14.34 14H9.66c-.09-.66-.16-1.32-.16-2s.07-1.35.16-2h4.68c.09.65.16 1.32.16 2s-.07 1.34-.16 2zm.25 5.56c.6-1.11 1.06-2.31 1.38-3.56h2.95c-.96 1.65-2.49 2.93-4.33 3.56zM16.36 14c.08-.66.14-1.32.14-2s-.06-1.34-.14-2h3.38c.16.64.26 1.31.26 2s-.1 1.36-.26 2h-3.38z"/>',
  users:  '<path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>',
  star:   '<path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>',
  fork:   '<path d="M6 3a3 3 0 11-1 5.83v6.34a3.001 3.001 0 11-2 0V8.83A3.001 3.001 0 116 3zm12 0a3 3 0 11-1 5.83V10a4 4 0 01-4 4h-2v1.17a3.001 3.001 0 11-2 0V14a2 2 0 00-2-2v-2a2 2 0 002-2V8.83A3.001 3.001 0 0118 3z"/>',
  package:'<path d="M12 2l9 4.9V17l-9 4.9L3 17V6.9L12 2zm0 2.236L5 8.118v7.764L12 19.764l7-3.882V8.118L12 4.236zM7 10l5 2.727L17 10v2.273L12 15l-5-2.727V10z"/>',
  git:    '<path d="M21.62 11.108L12.892 2.38a1.3 1.3 0 00-1.84 0l-1.81 1.81 2.29 2.3a1.55 1.55 0 011.96 1.97l2.21 2.21a1.55 1.55 0 11-.93.87l-2.06-2.06v5.43a1.55 1.55 0 11-1.27-.05V9.37a1.55 1.55 0 01-.84-2.03L8.4 5.066 2.38 11.09a1.3 1.3 0 000 1.84l8.72 8.72a1.3 1.3 0 001.84 0l8.67-8.67a1.3 1.3 0 00.01-1.87z"/>',
  doc:    '<path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>',
  eye:    '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17a5 5 0 110-10 5 5 0 010 10zm0-8a3 3 0 100 6 3 3 0 000-6z"/>',
  tag:    '<path d="M21.41 11.58l-9-9C12.05 2.22 11.55 2 11 2H4c-1.1 0-2 .9-2 2v7c0 .55.22 1.05.59 1.42l9 9c.36.36.86.58 1.41.58.55 0 1.05-.22 1.41-.59l7-7c.37-.36.59-.86.59-1.41s-.23-1.06-.59-1.42zM5.5 7C4.67 7 4 6.33 4 5.5S4.67 4 5.5 4 7 4.67 7 5.5 6.33 7 5.5 7z"/>',
  mail:   '<path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>'
};

function apply(variant, assetsBase) {
  const r = variant.accent;
  document.documentElement.style.setProperty('--accent', r.cyan);
  document.documentElement.style.setProperty('--accent-2', r.cyan2);
  document.documentElement.style.setProperty('--accent-bg', r.cyanBg);
  document.documentElement.style.setProperty('--accent-border', r.cyanBorder);
  document.documentElement.style.setProperty('--accent-glow', r.cyanBg);
  document.documentElement.style.setProperty('--accent-leak', r.cyanBg);
  document.documentElement.style.setProperty('--accent-ambient', r.cyanBg);
  document.documentElement.style.setProperty('--accent-plus', r.cyan2);

  document.getElementById('photoImg').src = assetsBase + 'profile-photo.png';
  document.getElementById('nameBlock').innerHTML = variant.nameLine1 + '<br>' + variant.nameLine2;
  document.getElementById('primaryRole').textContent = variant.primaryRole;
  document.getElementById('secondaryRole').innerHTML = variant.secondaryRole;

  const tagsEl = document.getElementById('tags');
  tagsEl.innerHTML = variant.tags.map(t => `<span class="tag">${t}</span>`).join('');

  document.getElementById('bio').textContent = variant.bio;
  document.getElementById('statsLabel').textContent = variant.statsLabel;

  const statsEl = document.getElementById('stats');
  statsEl.innerHTML = variant.stats.map(s => `
    <div class="sc">
      <div class="sc-icon-wrap">
        <svg viewBox="0 0 24 24">${ICON_SVG[s.icon] || ICON_SVG.star}</svg>
      </div>
      <div class="sc-body">
        <div class="sc-top">
          <span class="sc-num">${s.num}</span>${s.plus ? `<span class="sc-plus">${s.plus}</span>` : ''}
          <span class="sc-badge">${s.badge}</span>
        </div>
        <div class="sc-label">${s.label}</div>
      </div>
    </div>
  `).join('');

  document.getElementById('domainText').textContent = variant.domain;

  document.querySelectorAll('.di img[data-icon]').forEach(img => {
    img.src = assetsBase + 'tech/' + img.dataset.icon + '.svg';
  });
}

window.__applyVariant = apply;
</script>
</body>
</html>
