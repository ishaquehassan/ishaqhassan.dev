name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /tmp
            rm -rf ishaqhassan.dev-deploy
            GH_TOKEN=$(gh auth token)
            git clone "https://ishaquehassan:${GH_TOKEN}@github.com/ishaquehassan/ishaqhassan.dev.git" ishaqhassan.dev-deploy
            cp -f ishaqhassan.dev-deploy/*.html /var/www/ishaqhassan.dev/
            cp -r ishaqhassan.dev-deploy/assets /var/www/ishaqhassan.dev/
            cp -r ishaqhassan.dev-deploy/css /var/www/ishaqhassan.dev/
            cp -r ishaqhassan.dev-deploy/js /var/www/ishaqhassan.dev/
            cp -f ishaqhassan.dev-deploy/sitemap.xml /var/www/ishaqhassan.dev/ 2>/dev/null || true
            cp -f ishaqhassan.dev-deploy/robots.txt /var/www/ishaqhassan.dev/ 2>/dev/null || true
            cp -f ishaqhassan.dev-deploy/manifest.json /var/www/ishaqhassan.dev/ 2>/dev/null || true
            cp -f ishaqhassan.dev-deploy/llms.txt /var/www/ishaqhassan.dev/ 2>/dev/null || true
            cp -f ishaqhassan.dev-deploy/llms-full.txt /var/www/ishaqhassan.dev/ 2>/dev/null || true
            rm -rf ishaqhassan.dev-deploy
            echo "Deployed at $(date)"
